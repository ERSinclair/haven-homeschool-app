name: Daily digest email

on:
  schedule:
    # 10:00 AM Melbourne time (AEDT = UTC+11, AEST = UTC+10)
    # Using 23:00 UTC which covers both (10am AEDT / 9am AEST)
    - cron: '0 23 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest endpoint
        run: |
          curl -f -X GET "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
