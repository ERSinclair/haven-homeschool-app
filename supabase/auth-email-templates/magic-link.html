<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Haven sign-in link</title>
</head>
<body style="margin:0;padding:0;background:#f0fdf4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0fdf4;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="font-size:28px;font-weight:800;color:#059669;letter-spacing:-0.5px;">Haven</span>
            </td>
          </tr>

          <tr>
            <td style="background:#ffffff;border-radius:16px;padding:32px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
              <h1 style="margin:0 0 12px;font-size:22px;font-weight:700;color:#111827;">Sign in to Haven</h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#374151;">
                Click the button below to sign in. This link can only be used once.
              </p>
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 28px;background:#059669;color:#ffffff;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;">
                Sign in to Haven
              </a>
              <hr style="border:none;border-top:1px solid #f3f4f6;margin:24px 0;" />
              <p style="margin:0;font-size:13px;color:#6b7280;">
                This link expires in 1 hour. If you didn't request this, you can safely ignore it.
              </p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                Haven &middot; Find your community &middot;
                <a href="https://familyhaven.app" style="color:#9ca3af;text-decoration:underline;">familyhaven.app</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
